name: BIA Power-Price-Dashboard - CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Repository klonen (Code auf den Server laden)
        uses: actions/checkout@v4

      - name: Python 3.13.7 Umgebung aufsetzen
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.7"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Code-Qualität prüfen (Linting mit Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Unit Tests ohne echte DB-Verbindung ausführen
        env:
          PYTHONPATH: ${{ github.workspace }}
          CI: "true"
          PPD_TEST_MODE: "unit"
          POSTGRES_USER: "test_user"
          POSTGRES_PASSWORD: "test_password"
          POSTGRES_HOST: "localhost"
          POSTGRES_PORT: "5432"
          POSTGRES_DB: "test_db"
        run: |
          python -m pytest -m "not integration"
